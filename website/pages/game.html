<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="game.css" />
    <title>Road Rage</title>
  </head>

  <body>
    <div id="flexDiv">
      <div id="roadDiv"></div>
      <div id="linesDiv">
        <div id="leftLineDiv"></div>
        <div id="rightLineDiv"></div>
      </div>
      <img id="carImg" src="/website/images/car.png" />
      <div id="scoreDiv">Score: 0</div>
      <div id="gameOverDiv">
        <div id="gameOverTitleDiv">Game Over</div>
        <input id="nameInput" placeholder="Enter your name">
        <button id="submitButton">Submit Score</button>
        <div>Or press 'F5' to restart</div>
      </div>
    </div>
    <script type="module" src="game.js"></script>
  </body>
</html>
